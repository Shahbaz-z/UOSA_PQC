services:
  # Reflex app (default)
  pqc-demo:
    build: .
    ports:
      - "3000:3000"   # Reflex frontend
      - "8000:8000"   # Reflex backend API
    environment:
      - PQC_MOCK=0
    volumes:
      - ./benchmarks/results:/app/benchmarks/results

  # Run with mock mode (no liboqs required)
  pqc-demo-mock:
    build: .
    ports:
      - "3001:3000"
      - "8001:8000"
    environment:
      - PQC_MOCK=1
    profiles:
      - mock

  # Legacy Streamlit app
  pqc-demo-streamlit:
    build: .
    ports:
      - "8501:8501"
    environment:
      - PQC_MOCK=0
    command: ["streamlit", "run", "app/pqc_demo_streamlit.py"]
    profiles:
      - streamlit
