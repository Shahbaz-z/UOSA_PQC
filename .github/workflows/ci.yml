name: CI

on:
  push:
    branches: [main, develop, "claude/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests (mock mode)
        env:
          PQC_MOCK: "1"
        run: |
          python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check imports
        env:
          PQC_MOCK: "1"
        run: |
          python -c "from blockchain.chain_models import compare_all_solana, compare_all_bitcoin, compare_all_ethereum"
          python -c "from blockchain.zk_models import compare_all_zk_proofs"
          python -c "from blockchain.qr_score import score_all_chains"
          python -c "from pqc_lib.signatures import SIG_ALGORITHMS"
          python -c "from app.tabs import render_block_space, render_comparison, render_cross_chain, render_zk_proofs, render_qr_score"
